
<div class="service-wrapper">
        {% for service in services %}
           <div class="custom-item" data-animate-parent>
                <div class="custom-item-heading" data-animate>
                    <div class="custom-item-header">
                        <h2>{{service.service_title}}</h2>
                    </div>
                    <div class="custom-item-icon">
                        {% partial 'icons/closed-eye' %}
                    </div>
                </div>
                <div class="custom-item-content">
                    <div class="custom-item-content-left">
                        <div class="what-we-do">
                            {{service.service_content|raw}}
                        </div>  
                    </div>  
                    <div class="custom-item-content-right">
                        <img src="{{ service.service_image[0].path}}" alt="{{this.service.service_title}}"/>
                    </div>
                </div>
            </div>
            {% endfor %}
</div>
