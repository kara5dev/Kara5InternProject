<div class="pricing-section section-padding--y">
    <div class="container">
        <div data-animate-parent>
            <div class="section-heading" data-animate>
                <div class="hero-subtitle">
                    <div class="hero-subtitle-icon">
                        {% partial 'icons/dollar-sign' %}
                    </div>
                    <div class="hero-subtitle-text">{{subtitle}}</div>
                </div>
                <div class="brand-title">
                    <h2>{{title}}</h2>
                </div>
            </div>
        </div>
            {% partial 'site/pricing-contents'%}
            
    </div>
</div>
